[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0", "editables"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = false
fallback-version = "0.0.0.dev0"
metadata = false

[project]
name = "first-order-lambda"
dynamic = ["version"]
description = "A least-fixpoint first-order-shape-relation interpreter for the lambda-calculus"
readme = "README.md"
license = "MIT"
requires-python = ">=3.13"
authors = [{ name = "Yang, Bo", email = "yang-bo@yang-bo.com" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = ["fixpoints", "mixinv2"]

[tool.uv]
sources = { fixpoints = { workspace = true }, mixinv2 = { workspace = true } }

[tool.hatch.build.targets.wheel]
packages = ["src/first_order_lambda"]
only-include = ["src/first_order_lambda"]
sources = ["src"]

[project.urls]
Repository = "https://github.com/Atry/MIXINv2"
