- [BinNatVisitor]
- BinNatFactory:
    Product:
      Decrement:
        decreased: [Product]
    Zero:
      Decrement:
        decreased: [Zero]
    Even:
      half:
        Decrement:
          decreased: [Product]
      Decrement:
        _HalfAcceptance:
          - [Even, ~, half, Acceptance]
          - VisitorMap:
              ZeroVisitor:
                decreased: [Zero]
              EvenVisitor:
                decreased:
                  - [Odd]
                  - halfOfPredecessor: [Even, ~, half, Decrement, decreased]
              OddVisitor:
                decreased:
                  - [Odd]
                  - halfOfPredecessor: [Even, ~, half, Decrement, decreased]
            Accepted:
              decreased: [Product]
        decreased: [_HalfAcceptance, Accepted, decreased]
    Odd:
      Decrement:
        _HalfAcceptance:
          - [Odd, ~, halfOfPredecessor, Acceptance]
          - VisitorMap:
              ZeroVisitor:
                decreased: [Zero]
              EvenVisitor:
                decreased:
                  - [Even]
                  - half: [Odd, ~, halfOfPredecessor]
              OddVisitor:
                decreased:
                  - [Even]
                  - half: [Odd, ~, halfOfPredecessor]
            Accepted:
              decreased: [Product]
        decreased: [_HalfAcceptance, Accepted, decreased]
