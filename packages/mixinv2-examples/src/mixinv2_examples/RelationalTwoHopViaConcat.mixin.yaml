# Datalog join via concat + Acceptance-based two-hop.
#
# Facts:
#   edge(a,b).
#   edge(b,c).
#   edge(c,a).
#
# Step 1 — Cartesian product (no shared variable):
#   concat(X,Y,Z,W) :- edge(X,Y), edge(Z,W).
#
# Step 2 — Two-hop join via Acceptance (value-level Y==Z):
#   twoHop(X,W) :- edge(X,Y), edge(Y,W).
#
# Standard Datalog twoHop result:
#   {(a,c), (b,a), (c,b)}
#
# This encoding uses the RepeatedVisitor base (Relation/Cons/Nil/TailMap)
# with nested Acceptance/Replacement for the Cartesian product step.

- Relation:
    Acceptance:
      VisitorMap: []
      Visitor:
        Visited: []
      Accepted: []

- Nil:
    - [Relation]
    - Acceptance:
        VisitorMap:
          Nil: [Visitor]
        Visitor:
          Visited: []
        Accepted: [VisitorMap, Nil, Visited]
- Cons:
    - [Relation]
    - Tail:
        - [Relation]
        - Replacement:
            NewTail: [Relation]
            Replaced:
              - [Cons]
              - TailMap: []

- a:
    - [Cons]
    - Tail: []
      TailMap:
        a:
          - [Tail]
          - Replacement:
              NewTail: [Tail]
              Replaced:
                - [RelationalTwoHopViaConcat, ~, a]
                - TailMap:
                    a: [NewTail]
      WithVisitorTail:
        a:
          VisitorTail: [TailMap, a]
      WithVisiteeTail:
        a:
          VisiteeTail: [TailMap, a]
      Acceptance:
        - Visitor:
            Visited: []
          VisitorMap:
            - a: [Visitor]
          Accepted: [Acceptance, ~, VisitorMap, a, Visited]
- b:
    - [Cons]
    - Tail: []
    - TailMap:
        b:
          - [Tail]
          - Replacement:
              NewTail: [Tail]
              Replaced:
                - [RelationalTwoHopViaConcat, ~, b]
                - TailMap:
                    b: [NewTail]
      WithVisitorTail:
        b:
          VisitorTail: [TailMap, b]
      WithVisiteeTail:
        b:
          VisiteeTail: [TailMap, b]
      Acceptance:
        VisitorMap:
          b: [Visitor]
        Visitor:
          Visited: []
        Accepted: [VisitorMap, b, Visited]
- c:
    - [Cons]
    - Tail: []
    - TailMap:
        c:
          - [Tail]
          - Replacement:
              NewTail: [Tail]
              Replaced:
                - [RelationalTwoHopViaConcat, ~, c]
                - TailMap:
                    c: [NewTail]
      WithVisitorTail:
        c:
          VisitorTail: [TailMap, c]
      WithVisiteeTail:
        c:
          VisiteeTail: [TailMap, c]
      Acceptance:
        VisitorMap:
          c: [Visitor]
        Visitor:
          Visited: []
        Accepted: [VisitorMap, c, Visited]

# edge(a,b).
- edge:
    - [a]
    - TailMap:
        a:
          - [RelationalTwoHopViaConcat, ~, b]
          - TailMap:
              b: [Nil]

# edge(b,c).
- edge:
    - [b]
    - TailMap:
        b:
          - [RelationalTwoHopViaConcat, ~, c]
          - TailMap:
              c: [Nil]

# edge(c,a).
- edge:
    - [c]
    - TailMap:
        c:
          - [RelationalTwoHopViaConcat, ~, a]
          - TailMap:
              a: [Nil]

# Step 1: concat(X,Y,Z,W) :- edge(X,Y), edge(Z,W).
#
# Cartesian product via nested Acceptance/Replacement:
#   For each (X,Y) in edge, for each (Z,W) in edge,
#   construct (X,Y,Z,W) via 4 nested Replacements.
- _ConcatXAcceptance:
    - [edge, Acceptance]
    - VisitorMap: [edge, WithVisiteeTail]
    - Visitor:
        VisiteeTail: [edge, Tail]
        _X: [VisiteeTail]
        _ConcatYAcceptance:
          - [_X, Acceptance]
          - VisitorMap: [_X, WithVisiteeTail]
          - Visitor:
              VisiteeTail: [_X, Tail]
              _Y: [VisiteeTail]
              _NilAcceptance0:
                - [_Y, Acceptance]
                - VisitorMap:
                    Nil:
                      _ConcatZAcceptance:
                        - [edge, Acceptance]
                        - VisitorMap: [edge, WithVisiteeTail]
                        - Visitor:
                            VisiteeTail: [edge, Tail]
                            _Z: [VisiteeTail]
                            _ConcatWAcceptance:
                              - [_Z, Acceptance]
                              - VisitorMap: [_Z, WithVisiteeTail]
                              - Visitor:
                                  VisiteeTail: [_Z, Tail]
                                  _W: [VisiteeTail]
                                  _NilAcceptance1:
                                    - [_W, Acceptance]
                                    - VisitorMap:
                                        Nil:
                                          _WReplacement:
                                            - [_W, Replacement]
                                            - NewTail:
                                                [
                                                  RelationalTwoHopViaConcat,
                                                  ~,
                                                  Nil,
                                                ]
                                          _ZReplacement:
                                            - [_Z, Replacement]
                                            - NewTail: [_WReplacement, Replaced]
                                          _YReplacement:
                                            - [_Y, Replacement]
                                            - NewTail: [_ZReplacement, Replaced]
                                          _XReplacement:
                                            - [_X, Replacement]
                                            - NewTail: [_YReplacement, Replaced]
                                          Visited: [_XReplacement, Replaced]
                                  Visited: [_NilAcceptance1, Accepted]
                            Visited: [_ConcatWAcceptance, Accepted]
                      Visited: [_ConcatZAcceptance, Accepted]
              Visited: [_NilAcceptance0, Accepted]
        Visited: [_ConcatYAcceptance, Accepted]

  concat: [_ConcatXAcceptance, Accepted]

# Step 2: twoHop(X,W) :- edge(X,Y), edge(Y,W).
#
# Standard Acceptance-based two-hop join:
#   1. X: iterate first column of edge (outer acceptance)
#   2. Y: value-level join — match edge's second column against edge's first column
#   3. W: iterate matched edge's second column
#   4. Output (X, W) via Replacement

- _XAcceptance:
    - [edge, Acceptance]
    - VisitorMap: [edge, WithVisiteeTail]
    - Visitor:
        VisiteeTail: [edge, Tail]
        _X: [VisiteeTail]
        _YAcceptance:
          - [_X, Acceptance]
          - VisitorMap:
              - [edge, WithVisitorTail]
              - [_X, WithVisiteeTail]
            Visitor:
              VisiteeTail: [_X, Tail]
              _Y0: [VisiteeTail]
              VisitorTail: [edge, Tail]
              _Y1: [VisitorTail]
              _NilAcceptance0:
                - [_Y0, Acceptance]
                - VisitorMap:
                    - Nil:
                        _ZAcceptance:
                          - [_Y1, Acceptance]
                          - VisitorMap:
                              - [_Y1, WithVisiteeTail]
                          - Visitor:
                              VisiteeTail: [_Y1, Tail]
                              _Z: [VisiteeTail]
                              _NilAcceptance1:
                                - [VisiteeTail, Acceptance]
                                - VisitorMap:
                                    Nil:
                                      _ZReplacement:
                                        - [_Z, Replacement]
                                        - NewTail:
                                            [
                                              RelationalTwoHopViaConcat,
                                              ~,
                                              Nil,
                                            ]
                                      _XReplacement:
                                        - [_X, Replacement]
                                        - NewTail: [_ZReplacement, Replaced]
                                      Visited: [_XReplacement, Replaced]
                              Visited: [_NilAcceptance1, Accepted]
                        Visited: [_ZAcceptance, Accepted]
              Visited: [_NilAcceptance0, Accepted]
        Visited: [_YAcceptance, Accepted]

  twoHop: [_XAcceptance, Accepted]
